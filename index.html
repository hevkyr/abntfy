    <!-- SPA fallback decoder para GitHub Pages (par com public/404.html) -->
    <script>
      (function () {
        if (location.search && location.search.indexOf("?/") === 0) {
          var decoded = location.search
            .slice(2)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          history.replaceState(null, "", location.pathname.slice(0, -1) + decoded + location.hash);
        }
      })();
    </script>
